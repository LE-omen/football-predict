name: Update Matches and Settle

on:
  schedule:
    # Beijing: 01:07, 04:07, 07:07, 10:07, 13:07, 16:07, 19:07, 22:07
    - cron: '7 17,20,23,2,5,8,11,14 * * *'
  workflow_dispatch:

jobs:
  update-matches:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync matches via lazq API
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/update-matches.ts